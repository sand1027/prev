name: LeetCode Daily Solver

on:
  schedule:
    - cron: "30 3 * * *"    # 9:00 AM IST (UTC+5:30)
    - cron: "30 12 * * *"   # 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Solve 1 LeetCode problem
        id: solve
        env:
          LEETCODE_SESSION: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..NIh29232pB5jqQkceCYrGx75i0fAqRtbME0ey2ufG8c"
          LEETCODE_CSRF: "tmkp7WWjJaZBcdaVn4mmRNATZusUqarF"
        run: python leetcode_daily.py 2>&1 | tee /tmp/solve_output.txt

      - name: Send Telegram — Success
        if: success()
        run: |
          OUTPUT=$(cat /tmp/solve_output.txt | tail -20)
          MSG="✅ LeetCode Solver — SUCCESS%0A$(date '+%Y-%m-%d %H:%M IST')%0A%0A${OUTPUT}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}"

      - name: Send Telegram — Failure
        if: failure()
        run: |
          OUTPUT=$(cat /tmp/solve_output.txt 2>/dev/null | tail -20 || echo "No output captured")
          MSG="❌ LeetCode Solver — FAILED%0A$(date '+%Y-%m-%d %H:%M IST')%0A%0A${OUTPUT}%0A%0A⚠️ Session cookie may have expired. Update LEETCODE_SESSION in workflow.%0ARun: https://github.com/${{ github.repository }}/actions"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}"
