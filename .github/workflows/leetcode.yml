name: LeetCode Daily Solver

on:
  schedule:
    - cron: "30 3 * * *"    # 9:00 AM IST (UTC+5:30)
    - cron: "30 12 * * *"   # 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Solve 1 LeetCode problem
        id: solve
        env:
          LEETCODE_SESSION: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..NIh29232pB5jqQkceCYrGx75i0fAqRtbME0ey2ufG8c"
          LEETCODE_CSRF: "tmkp7WWjJaZBcdaVn4mmRNATZusUqarF"
        run: python leetcode_daily.py

      - name: Telegram success
        if: success()
        env:
          BOT: ${{ vars.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ vars.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
        run: |
          python3 -c "
          import os, urllib.request, urllib.parse
          msg = '✅ LeetCode Solver SUCCESS\nRepo: ' + os.environ['REPO'] + '\nRun: https://github.com/' + os.environ['REPO'] + '/actions'
          data = urllib.parse.urlencode({'chat_id': os.environ['CHAT'], 'text': msg}).encode()
          urllib.request.urlopen('https://api.telegram.org/bot' + os.environ['BOT'] + '/sendMessage', data)
          print('Telegram sent')
          "

      - name: Telegram failure
        if: failure()
        env:
          BOT: ${{ vars.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ vars.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
        run: |
          python3 -c "
          import os, urllib.request, urllib.parse
          msg = '❌ LeetCode Solver FAILED\nSession cookie may have expired!\nUpdate LEETCODE_SESSION in workflow file.\nRun: https://github.com/' + os.environ['REPO'] + '/actions'
          data = urllib.parse.urlencode({'chat_id': os.environ['CHAT'], 'text': msg}).encode()
          urllib.request.urlopen('https://api.telegram.org/bot' + os.environ['BOT'] + '/sendMessage', data)
          print('Telegram sent')
          "
