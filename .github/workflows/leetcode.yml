name: LeetCode Daily Solver

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

env:
  LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
  LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
  GH_TOKEN_1: ${{ secrets.GH_TOKEN_1 }}
  GITHUB_REPO: prev

jobs:
  solve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Check secrets are set
        run: |
          if [ -z "$LEETCODE_SESSION" ]; then echo "❌ LEETCODE_SESSION is empty"; exit 1; fi
          if [ -z "$LEETCODE_CSRF" ]; then echo "❌ LEETCODE_CSRF is empty"; exit 1; fi
          if [ -z "$GH_TOKEN_1" ]; then echo "❌ GH_TOKEN_1 is empty"; exit 1; fi
          echo "✅ All secrets present"

      - name: Solve 2 LeetCode problems and commit
        run: python leetcode_daily.py
